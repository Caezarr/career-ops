name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs on the same ref when a new push lands — saves
# minutes and avoids merging a stale "green" tick on the wrong commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (TypeScript / Vite)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # `version` is intentionally omitted — package.json's
      # `packageManager: pnpm@9.15.4` is the source of truth.
      # Setting both raises ERR_PNPM_BAD_PM_VERSION.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type-check (tsc)
        run: pnpm exec tsc -b

      - name: Build (vite)
        run: pnpm build

  rust:
    name: Rust (clippy / check / test)
    runs-on: macos-14
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      # `dtolnay/rust-toolchain@stable` is flaky on macos-14 — the
      # runner ships with `rustup-init` (the installer) on PATH but
      # not a complete toolchain, and the action sometimes invokes
      # `rustup-init component add clippy` (no such subcommand) →
      # "unexpected argument 'clippy'" failure. The maintained
      # `actions-rust-lang/setup-rust-toolchain@v1` calls `rustup`
      # explicitly + ensures `~/.cargo/bin` is on PATH.
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          cache: false  # we use Swatinem/rust-cache below for the cargo cache

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # We do NOT enforce `cargo fmt --check` yet — many existing files
      # don't match rustfmt's defaults. Add it once the codebase is
      # rustfmt-clean (separate PR).
      # - name: Format check
      #   run: cargo fmt --all -- --check

      - name: Clippy (warnings as errors)
        # `--all-targets` covers tests + examples; --no-deps keeps the
        # signal focused on our code, not third-party crates.
        run: cargo clippy --all-targets --no-deps -- -D warnings

      - name: Cargo check
        run: cargo check --all-targets

      - name: Cargo test
        run: cargo test --all -- --test-threads=1
