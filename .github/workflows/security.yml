name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Daily 06:00 UTC scan so a fresh advisory landing on a published
    # transitive dep gets surfaced even when no PR is in flight.
    - cron: "0 6 * * *"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Cargo.lock lives under src-tauri/, not at repo root. Install
      # cargo-audit and run it from there directly. (rustsec/audit-check
      # @v2.0.0 doesn't accept a working-directory input.)
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        # Default: fail on vulnerabilities only. Yanked / unmaintained
        # warnings are surfaced but don't block the build (they
        # often appear for transitive deps we can't directly bump).
        # Tighten to `--deny warnings` once the dep tree is squeaky.
        #
        # Allowlist: RUSTSEC-2023-0071 — Marvin Attack timing sidechannel
        # in `rsa`. Transitive dep with NO upstream fix available. Not
        # exploitable in our usage pattern (no RSA decryption on a
        # network-attacker-controlled timing surface in the Tauri app).
        # Re-evaluate quarterly; remove the ignore the moment a fixed
        # upgrade ships.
        working-directory: src-tauri
        run: cargo audit --ignore RUSTSEC-2023-0071

  pnpm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `version` intentionally omitted — package.json's `packageManager`
      # field is the single source of truth.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      # `--audit-level high` matches our CI policy: HIGH and CRITICAL
      # advisories fail the build; LOW/MEDIUM warn but don't block.
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high --prod

  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  priv01-egress-guard:
    name: PRIV-01 single-egress guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid ad-hoc reqwest::Client::builder() outside cloud.rs
        # All 9 ad-hoc `reqwest::Client::builder()` sites have been
        # migrated to `crate::cloud::*`. This guardrail ENFORCES the
        # invariant — any future commit re-introducing the pattern
        # outside `cloud.rs` fails the build.
        #
        # Doc-comment mentions are filtered (`grep -v '^[^:]*://'`)
        # so prose like "the old `reqwest::Client::builder()` pattern"
        # in module headers doesn't trip the gate.
        run: |
          set -euo pipefail
          violations=$(git grep -n 'reqwest::Client::builder()' \
            -- 'src-tauri/src/' ':!src-tauri/src/cloud.rs' \
            | grep -v -E ':[[:space:]]*//' || true)
          count=$(printf '%s' "$violations" | grep -c . || true)
          echo "PRIV-01 reqwest::Client::builder() violations: $count"
          if [ -n "$violations" ]; then
            echo "$violations"
          fi
          if [ "$count" -gt 0 ]; then
            echo "::error::PRIV-01 violated — every outbound call must go through crate::cloud::*"
            exit 1
          fi
