version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      tauri:
        patterns: ["@tauri-apps/*"]
      react:
        patterns: ["react", "react-dom", "@types/react*"]
      vite:
        patterns: ["vite", "@vitejs/*"]
      dnd:
        patterns: ["@dnd-kit/*"]

  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      tauri:
        patterns: ["tauri", "tauri-*", "tauri-plugin-*"]
      sqlx:
        patterns: ["sqlx", "sqlx-*"]
      tokio:
        patterns: ["tokio", "tokio-*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
