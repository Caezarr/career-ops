name = "career-os-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"

# Custom domain — already set up via Cloudflare Dashboard
# (Workers → career-os-api → Settings → Triggers → Custom Domains).
# Listing it here too is best-practice — keeps wrangler.toml the
# single source of truth so a `wrangler deploy` from a fresh clone
# re-creates the route automatically.
#
# NOTE: custom_domain entries take just the hostname (no `/*`, no
# path). Wildcards belong to non-custom-domain `routes` which need
# a zone subscription. Cloudflare rejects mixed forms.
routes = [
  { pattern = "api.careeros.fr", custom_domain = true },
]

# D1 database binding — created via:
#   wrangler d1 create career_os
# Then paste the returned database_id here.
[[d1_databases]]
binding = "DB"
database_name = "career_os"
database_id = "077cbe9c-4ff3-4086-9248-fdaa117ec490"
migrations_dir = "migrations"

# Secrets (set via `wrangler secret put <NAME>`):
#   - JWT_SECRET            — 32+ random bytes for HMAC signing
#   - LOOPS_API_KEY         — from app.loops.so → Settings → API
#   - LOOPS_TRANSACTIONAL_ID — Loops template id for the magic link email
#
# The vars below are non-secret — overridden per environment via
# `wrangler.toml [env.production].vars`.
[vars]
APP_DEEP_LINK = "careeros://auth/callback"
WEB_BASE_URL = "https://api.careeros.fr"
MAGIC_LINK_TTL_SECONDS = "900"
JWT_TTL_SECONDS = "2592000"
# GitHub repo the auto-updater proxies for the latest release. Set
# to your fork or leave commented to disable update checks (the
# /v1/updates endpoint will respond 204 No Content).
GITHUB_REPO = "Caezarr/career-ops"

# Bundle the LaTeX template as a text-import. Wrangler resolves
# `import x from "./templates/cv-template.tex"` to a string at
# build time. Used by the /v1/ai/optimize-cv endpoint.
[[rules]]
type = "Text"
globs = ["**/*.tex"]
fallthrough = true
