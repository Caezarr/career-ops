<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon: prefer the SVG when the browser supports it (sharp at
         all sizes), fall back to the PNG export for older Safari /
         Apple Touch icons. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0B0F" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafafb" media="(prefers-color-scheme: light)" />

    <!-- No-flash theme bootstrap. Runs synchronously BEFORE the React
         bundle hydrates, so the user never sees a dark→light or
         light→dark flicker on first paint. Mirrors the resolution
         logic in src/lib/theme.ts (kept in sync by hand — they are
         the only two implementations). -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("careeros-theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>

    <!-- Primary meta -->
    <title>Career OS — L'OS de carrière pour viser les top firms</title>
    <meta
      name="description"
      content="Track every application. Tailor every CV. Drill every question. Et quand l'entretien commence, un coach silencieux ancré dans ton CV. Application Mac native, local-first."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:title" content="Career OS — L'OS de carrière pour viser les top firms" />
    <meta
      property="og:description"
      content="Une seule fenêtre pour 40 candidatures, ATS analyzer en local, Live Copilot pendant l'entretien. Beta privée, Mac only."
    />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Career OS — L'OS de carrière pour viser les top firms" />
    <meta
      name="twitter:description"
      content="Une seule fenêtre pour 40 candidatures, ATS analyzer en local, Live Copilot pendant l'entretien. Beta privée, Mac only."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
